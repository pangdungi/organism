<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#2d3e2d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="라이프 플래너" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;500&family=Noto+Sans+KR:wght@300;400&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>라이프 플래너</title>
    <!-- FOUC 방지: 번들·main.css 적용 전 첫 페인트에서 로그인/방향 안내가 쌓여 보이지 않게 -->
    <style>
      html,
      body {
        margin: 0;
        overflow-x: hidden;
      }
      html {
        background: #2d3e2d;
      }
      body {
        background: #2d3e2d;
      }
      #app {
        display: none;
      }
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483646;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        background: #2d3e2d;
        color: #f2ede0;
      }
      .app-tablet-landscape-hint,
      .app-phone-portrait-hint {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div
      id="app-splash"
      class="app-splash"
      role="status"
      aria-live="polite"
      aria-label="앱을 불러오는 중"
    >
      <div class="app-splash-bg" aria-hidden="true">
        <span class="app-splash-orb app-splash-orb--tl"></span>
        <span class="app-splash-orb app-splash-orb--bl"></span>
      </div>
      <div class="app-splash-main">
        <p class="app-splash-brand">Organism</p>
      </div>
      <div class="app-splash-footer">
        <div class="app-splash-bar-track" aria-hidden="true">
          <div class="app-splash-bar-fill"></div>
        </div>
        <p class="app-splash-loading-label">LOADING</p>
        <div class="app-splash-arrow" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.2" opacity="0.4" />
            <path
              d="M8 10l4 4 4-4"
              stroke="currentColor"
              stroke-width="1.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
      </div>
    </div>
    <!-- 태블릿(아이패드 미니 등) 세로: 가로 전환 안내 (CSS로 표시 구간 제어) -->
    <div
      id="tablet-landscape-hint"
      class="app-tablet-landscape-hint"
      aria-hidden="true"
    >
      <div class="app-tablet-landscape-hint-inner">
        <p id="tablet-landscape-hint-title" class="app-tablet-landscape-hint-title">
          가로 모드에서 이용해 주세요
        </p>
        <p class="app-tablet-landscape-hint-desc">
          이 화면 크기에서는 세로보다 <strong>가로</strong>로 두는 것이 보기 좋습니다.<br />
          기기를 옆으로 돌려 주세요.
        </p>
      </div>
    </div>
    <!-- 모바일 폰 가로: 세로 전환 안내 (CSS로 표시 구간 제어) -->
    <div
      id="phone-portrait-hint"
      class="app-phone-portrait-hint"
      aria-hidden="true"
    >
      <div class="app-phone-portrait-hint-inner">
        <p id="phone-portrait-hint-title" class="app-phone-portrait-hint-title">
          세로 모드에서 이용해 주세요
        </p>
        <p class="app-phone-portrait-hint-desc">
          모바일에서는 화면을 <strong>세로</strong>로 돌려 주세요.
        </p>
      </div>
    </div>
    <div id="app">
      <!-- 진입: 기본 회원가입, 로그인은 전환 -->
      <div id="login-page" class="page login-page login-page--gate" style="display: flex">
        <header class="auth-gate-header">
          <div class="auth-gate-header-inner">
            <span class="auth-gate-logo">Organism</span>
          </div>
        </header>
        <div class="auth-gate-body">
          <div class="login-wrap">
            <div class="login-card login-card--brand">
            <div id="auth-panel-signup" class="auth-gate-panel">
            <h1 class="login-title">회원가입</h1>
            <form class="login-form" id="signup-form" onsubmit="return false">
              <div class="login-field">
                <label class="login-label" for="signup-email">이메일</label>
                <input type="email" id="signup-email" class="login-input" placeholder="이메일 주소" autocomplete="email" />
              </div>
              <div class="login-field">
                <label class="login-label" for="signup-pw">비밀번호</label>
                <input type="password" id="signup-pw" class="login-input" placeholder="6자 이상" autocomplete="new-password" />
              </div>
              <div class="login-field">
                <label class="login-label" for="signup-pw-confirm">비밀번호 확인</label>
                <input type="password" id="signup-pw-confirm" class="login-input" placeholder="비밀번호 다시 입력" autocomplete="new-password" />
                <label class="login-show-pw">
                  <input type="checkbox" id="signup-show-pw" class="login-show-pw-checkbox" /> 비밀번호 보기
                </label>
              </div>
              <button type="button" class="login-btn-cta" id="btn-do-signup">가입하기</button>
            </form>
            <p class="login-auth-switch">
              <button type="button" class="login-link" id="btn-go-login">이미 계정이 있어요? 로그인</button>
            </p>
            </div>
            <div id="auth-panel-login" class="auth-gate-panel" style="display: none">
            <h1 class="login-title">로그인</h1>
            <p class="login-auth-switch login-auth-switch--tight">
              <button type="button" class="login-link" id="btn-go-signup">처음이에요? 회원가입</button>
            </p>
            <form class="login-form" onsubmit="return false">
              <div class="login-field">
                <label class="login-label" for="login-id">아이디(이메일)</label>
                <input type="text" id="login-id" class="login-input" placeholder="아이디(이메일)" autocomplete="email" />
              </div>
              <div class="login-field">
                <label class="login-label" for="login-pw">비밀번호</label>
                <input type="password" id="login-pw" class="login-input" placeholder="비밀번호" autocomplete="current-password" />
                <label class="login-show-pw">
                  <input type="checkbox" id="login-show-pw" class="login-show-pw-checkbox" /> 비밀번호 보기
                </label>
              </div>
              <button type="button" class="login-btn-cta" id="btn-do-login">로그인</button>
            </form>
            <div class="login-change-pw">
              <button type="button" class="login-link" id="btn-show-change-pw">비밀번호 변경</button>
              <span class="login-link-sep">·</span>
              <button type="button" class="login-link" id="btn-show-forgot-pw">비밀번호 찾기</button>
              <div id="forgot-pw-form" class="login-change-form" style="display:none">
                <p class="login-forgot-desc">가입한 이메일 주소를 입력하면 비밀번호 재설정 링크를 보내드려요.</p>
                <input type="text" id="forgot-pw-email" class="login-input" placeholder="이메일 주소" autocomplete="email" />
                <div class="login-change-actions">
                  <button type="button" class="login-btn-cta login-btn-sm" id="btn-send-reset-mail">재설정 메일 보내기</button>
                  <button type="button" class="login-link" id="btn-cancel-forgot">취소</button>
                </div>
              </div>
              <div id="change-pw-form" class="login-change-form" style="display:none">
                <input type="text" id="cp-email" class="login-input" placeholder="아이디(이메일)" />
                <input type="password" id="cp-current" class="login-input" placeholder="현재 비밀번호" />
                <input type="password" id="cp-new" class="login-input" placeholder="새 비밀번호" />
                <input type="password" id="cp-confirm" class="login-input" placeholder="새 비밀번호 확인" />
                <label class="login-show-pw">
                  <input type="checkbox" id="cp-show-pw" class="login-show-pw-checkbox" /> 비밀번호 보기
                </label>
                <div class="login-change-actions">
                  <button type="button" class="login-btn-cta login-btn-sm" id="btn-change-pw">변경하기</button>
                  <button type="button" class="login-link" id="btn-cancel-pw">취소</button>
                </div>
              </div>
            </div>
            </div>
          </div>
          </div>
        </div>
        <footer class="auth-gate-footer">
          <p>이 화면에서 회원가입·로그인할 수 있어요. 구독·이용기한은 계정 생성 후 안내됩니다.</p>
        </footer>
      </div>

      <!-- 비밀번호 재설정 (이메일 링크 클릭 후) -->
      <div id="reset-password-page" class="page login-page login-page--gate" style="display: none">
        <header class="auth-gate-header">
          <div class="auth-gate-header-inner">
            <span class="auth-gate-logo">Organism</span>
          </div>
        </header>
        <div class="auth-gate-body">
        <div class="login-wrap">
          <div class="login-card login-card--brand">
            <h1 class="login-title">새 비밀번호 설정</h1>
            <p class="login-desc">새 비밀번호를 입력해 주세요.</p>
            <form class="login-form" onsubmit="return false">
              <div class="login-field">
                <label class="login-label" for="reset-pw-new">새 비밀번호</label>
                <input type="password" id="reset-pw-new" class="login-input" placeholder="새 비밀번호 (6자 이상)" autocomplete="new-password" />
              </div>
              <div class="login-field">
                <label class="login-label" for="reset-pw-confirm">새 비밀번호 확인</label>
                <input type="password" id="reset-pw-confirm" class="login-input" placeholder="새 비밀번호 확인" autocomplete="new-password" />
                <label class="login-show-pw">
                  <input type="checkbox" id="reset-pw-show" class="login-show-pw-checkbox" /> 비밀번호 보기
                </label>
              </div>
              <button type="button" class="login-btn-cta" id="btn-reset-pw-submit">비밀번호 변경하기</button>
            </form>
          </div>
        </div>
        </div>
      </div>

      <!-- 로그인 성공 후 메인 앱 -->
      <div id="signin-page" class="page" style="display:none">
        <div id="app-screen"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
